<div id="chat_archive_pack_settings" class="chat-archive-pack-settings">
  <div class="chat-archive-pack-heading">
    <div>
      <strong>聊天归档包</strong>
      <small>把多个原生聊天收束进 JSON 归档包，并可安全释放回 .jsonl。</small>
    </div>
    <button id="chat_archive_pack_open" class="menu_button">打开主面板</button>
  </div>
  <label>
    <input id="chat_archive_pack_auto_update" type="checkbox">
    每 30 分钟自动更新归档
  </label>
  <label>
    <input id="chat_archive_pack_auto_delete" type="checkbox">
    自动任务允许收束删除非当前聊天
  </label>
  <label>
    <input id="chat_archive_pack_delete_default" type="checkbox">
    手动收束时默认勾选删除
  </label>
  <label class="chat-archive-pack-field">
    <span>界面主题</span>
    <select id="chat_archive_pack_theme" class="text_pole">
      <option value="system">跟随系统</option>
      <option value="light">浅色</option>
      <option value="dark">深色</option>
    </select>
  </label>
</div>
